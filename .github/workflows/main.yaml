name: Java/Kotlin CI with Kotest

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. On lance notre linter personnalisé (qui évite les conflits de version)
      - name: Run Linter (Detekt)
        run: ./gradlew detektCheck

      # 2. On lance les tests d'architecture (ArchUnit)
      - name: Run Architecture Tests
        run: ./gradlew testArchitecture

      # 3. On lance tous les tests fonctionnels (Unit, Integration, Component)
      # On garde --continue pour avoir le rapport complet même en cas d'échec
      - name: Run All Functional Tests
        run: ./gradlew test testIntegration testComponent --continue

      # 4. Publication du tableau de résultats (Unit + Integration + Component + Architecture)
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/build/test-results/test/*.xml
            **/build/test-results/testIntegration/*.xml
            **/build/test-results/testComponent/*.xml
            **/build/test-results/testArchitecture/*.xml