name: Java/Kotlin CI with Kotest

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Droits nécessaires pour écrire les rapports dans le repo
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write

    steps:
      # 1. Récupérer le code
      - uses: actions/checkout@v4

      # 2. Installer Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Droits d'exécution
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build et Tests
      - name: Build and Test with Gradle
        run: ./gradlew build

      # 5. JaCoCo (Couverture de code)
      - name: Generate JaCoCo Report
        run: ./gradlew jacocoTestReport

      # 6. Publication de la couverture (Le plugin attendu)
      - name: Log Code Coverage
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80

      # 7. Publication des résultats JUnit
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/build/test-results/**/*.xml"